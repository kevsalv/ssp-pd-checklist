<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#E8892B"/>
  
  <!-- Checkmark (top row, vertically centered at y=37) -->
  <polyline points="18,37 25,44 38,28" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Line next to checkmark -->
  <line x1="48" y1="37" x2="82" y2="37" stroke="white" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Circle (bottom row, vertically centered at y=63) -->
  <circle cx="27" cy="63" r="8" stroke="white" stroke-width="6" fill="none"/>
  
  <!-- Line next to circle -->
  <line x1="48" y1="63" x2="82" y2="63" stroke="white" stroke-width="7" stroke-linecap="round"/>
</svg>
